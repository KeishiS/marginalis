[config]
default_to_workspace = false
skip_core_tasks = true

[tasks.default]
alias = "verify"

[tasks.fmt]
description = "Format Rust and Nix source files"
dependencies = ["fmt-rust", "fmt-nix"]

[tasks.format]
alias = "fmt"

[tasks.fmt-rust]
description = "Format Rust source files"
command = "cargo"
args = ["fmt", "--all"]

[tasks.fmt-nix]
description = "Format the Nix flake"
command = "nixfmt"
args = ["flake.nix", "nix/module.nix"]

[tasks.fmt-check]
description = "Check Rust and Nix formatting without modifying files"
dependencies = ["fmt-check-rust", "fmt-check-nix"]

[tasks.format-check]
alias = "fmt-check"

[tasks.fmt-check-rust]
description = "Check Rust formatting without modifying files"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.fmt-check-nix]
description = "Check Nix formatting without modifying files"
command = "nixfmt"
args = ["--check", "flake.nix", "nix/module.nix"]

[tasks.check]
description = "Type-check all workspace targets and features"
command = "cargo"
args = ["check", "--workspace", "--all-targets", "--all-features"]

[tasks.clippy]
description = "Run Clippy with warnings denied"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.lint]
alias = "clippy"

[tasks.test]
description = "Run all workspace tests"
command = "cargo"
args = ["test", "--workspace", "--all-features"]

[tasks.build]
description = "Build all workspace targets and features"
command = "cargo"
args = ["build", "--workspace", "--all-targets", "--all-features"]

[tasks.flake-check]
description = "Evaluate the Nix flake without building every output"
command = "nix"
args = ["flake", "check", "--no-build"]

[tasks.actionlint]
description = "Validate GitHub Actions workflow syntax"
command = "actionlint"
args = [".github/workflows/ci.yml", ".github/workflows/release-gate.yml"]

[tasks.nix-release-check]
description = "Build and run the Nix flake checks, including the NixOS VM test"
command = "nix"
args = ["flake", "check", "-L"]

[tasks.release-package]
description = "Build the Linux release package without creating a result symlink"
command = "nix"
args = ["build", ".#packages.x86_64-linux.default", "--no-link"]

[tasks.release-metadata]
description = "Verify release version and declared dual-license files"
script_runner = "@shell"
script = '''
set -eu
test -s LICENSE-MIT
test -s LICENSE-APACHE
cargo metadata --no-deps --format-version 1 | jq -e '
  all(.packages[];
    .version == "0.1.1"
    and .license == "MIT OR Apache-2.0"
    and .publish == [])
'
'''

[tasks.release-gate]
description = "Run every automated gate required before an RC or final release"
dependencies = ["verify", "actionlint", "release-metadata", "nix-release-check", "release-package"]

[tasks.dependency-boundaries]
description = "Reject concrete adapters from transport production dependency graphs"
script_runner = "@shell"
script = '''
set -eu
for package in marginalis-web marginalis-mcp; do
  if cargo tree -p "$package" -e normal | grep -E 'marginalis-(sqlite|files|asciidoc|auth-oidc|server)|(^| )sqlx |(^| )adocweave |(^| )openidconnect |(^| )reqwest ' >/dev/null; then
    echo "concrete adapter leaked into $package production dependencies" >&2
    exit 1
  fi
done
'''

[tasks.openapi-check]
description = "Validate the published OpenAPI document and required REST paths"
command = "jq"
args = [
  "-e",
  ".openapi == \"3.1.0\" and .info.version == \"v1\" and (.paths[\"/api/v1/openapi.json\"] | has(\"get\")) and (.paths[\"/api/v1/notes\"] | has(\"get\") and has(\"post\")) and (.paths[\"/api/v1/admin/users/pending\"] | has(\"get\")) and (.components.schemas.Problem.required == [\"code\", \"message\"]) and (.components.schemas.UuidV7.pattern | startswith(\"^[0-9a-fA-F]{8}\")) and (.components.schemas.McpAuthorization.properties.authorized_at.format == \"date-time\") and (.paths[\"/api/v1/notes/{note_id}/source\"].get.responses[\"200\"].headers.ETag.required == true)",
  "docs/openapi.json",
]

[tasks.adocweave-version-check]
description = "Verify the pinned AdocWeave package version and supply-chain identity"
script_runner = "@shell"
script = '''
set -eu
expected_version="0.6.1"
expected_revision="2a7ec4f7c2df6104ead9a7285ca13fc364ce8dda"
expected_hash="sha256-FEjYbbpKsk3k5u1NucINXho/Z0Pl6OOFFI8xhTJCIv4="
expected_fixture_hash="sha256-Mlx66KZinQKdFGkFngC4hJKXKZ7VYGnhEelI8u3lLFg="

cargo metadata --locked --format-version 1 | jq -e \
  --arg version "$expected_version" \
  --arg revision "$expected_revision" '
    [.packages[]
      | select(.name == "adocweave" or .name == "adocweave-wasm")
      | select(
          .version == $version
          and (.source | contains("rev=" + $revision))
          and (.source | endswith("#" + $revision))
        )]
    | length == 2
  ' >/dev/null

grep -Fq "pub const ADOCWEAVE_SOURCE_REVISION: &str = \"$expected_revision\";" \
  crates/marginalis-asciidoc/src/lib.rs
grep -Fq "pub const PINNED_ADOCWEAVE_PACKAGE_VERSION: &str = \"$expected_version\";" \
  crates/marginalis-asciidoc/src/lib.rs
grep -Fq "\"adocweave-$expected_version\" = \"$expected_hash\";" flake.nix
grep -Fq "AdocWeave/$expected_revision/fixtures/conformance/cases.json" flake.nix
grep -Fq "hash = \"$expected_fixture_hash\";" flake.nix

if grep -Eq 'WASM_API_VERSION|PINNED_CONTRACTS|CONTRACT_VERSION|contractVersion' \
  crates/marginalis-asciidoc/src/lib.rs crates/marginalis-server/src/lib.rs; then
  echo "legacy AdocWeave contract identity remains" >&2
  exit 1
fi
if grep -Eq '^adocweave[.]workspace' crates/marginalis-server/Cargo.toml; then
  echo "marginalis-server directly depends on AdocWeave" >&2
  exit 1
fi
'''

[tasks.verify]
description = "Run formatting, static analysis, tests, and flake evaluation"
dependencies = ["fmt-check", "check", "clippy", "test", "dependency-boundaries", "openapi-check", "adocweave-version-check", "flake-check"]
